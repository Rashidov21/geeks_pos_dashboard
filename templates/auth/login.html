{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
  <form method="post" class="bg-white p-8 rounded-xl shadow-md w-full max-w-md space-y-4">
    {% csrf_token %}
    <h1 class="text-2xl font-semibold text-center">Owner Dashboard Login</h1>
    <div>
      <label class="block text-sm font-medium mb-1">Username</label>
      <input type="text" name="username" class="w-full border rounded-lg px-3 py-2" required>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" class="w-full border rounded-lg px-3 py-2" required>
    </div>
    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg py-2">Sign In</button>
  </form>
</div>
{% endblock %}
